<svg width="100%" viewBox="0 0 680 740" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Bifrost MCP network flow</title>
  <desc>Shows how Claude Desktop, Bifrost, and the kubernetes-mcp-server connect across k3d and kind clusters</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .box-gray   { fill: #f1efe8; stroke: #888780; }
      .box-purple { fill: #eeedfe; stroke: #534ab7; }
      .box-teal   { fill: #e1f5ee; stroke: #0f6e56; }
      .box-amber  { fill: #faeeda; stroke: #854f0b; }
      .box-blue   { fill: #e6f1fb; stroke: #185fa5; }
      .box-coral  { fill: #faece7; stroke: #993c1d; }
      .label-teal  { fill: #0f6e56; }
      .label-amber { fill: #854f0b; }
      .label-gray  { fill: #5f5e5a; }
      @media (prefers-color-scheme: dark) {
        text { fill: #c2c0b6; }
        .ts  { fill: #9c9a92; }
        .box-gray   { fill: #2c2c2a; stroke: #888780; }
        .box-purple { fill: #26215c; stroke: #afa9ec; }
        .box-teal   { fill: #04342c; stroke: #5dcaa5; }
        .box-amber  { fill: #412402; stroke: #ef9f27; }
        .box-blue   { fill: #042c53; stroke: #85b7eb; }
        .box-coral  { fill: #4a1b0c; stroke: #f0997b; }
        .label-teal  { fill: #5dcaa5; }
        .label-amber { fill: #ef9f27; }
        .label-gray  { fill: #b4b2a9; }
      }
    </style>
  </defs>

  <!-- Mac Host container -->
  <rect x="20" y="20" width="640" height="200" rx="14" class="box-gray" stroke-width="0.5"/>
  <text class="th" x="40" y="48">Mac host</text>
  <text class="ts" x="40" y="64">Launch Agent auto-starts on login · runs independently of Claude Desktop</text>

  <!-- Claude Desktop -->
  <rect x="44" y="80" width="160" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
  <text class="th" x="124" y="104" text-anchor="middle" dominant-baseline="central">Claude Desktop</text>
  <text class="ts" x="124" y="122" text-anchor="middle" dominant-baseline="central">stdio mode (separate)</text>

  <!-- MCP Server -->
  <rect x="260" y="80" width="200" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
  <text class="th" x="360" y="104" text-anchor="middle" dominant-baseline="central">kubernetes-mcp-server</text>
  <text class="ts" x="360" y="122" text-anchor="middle" dominant-baseline="central">SSE :8811 · /sse · /healthz</text>

  <!-- Ollama -->
  <rect x="500" y="80" width="140" height="56" rx="8" class="box-amber" stroke-width="0.5"/>
  <text class="th" x="570" y="104" text-anchor="middle" dominant-baseline="central">Ollama</text>
  <text class="ts" x="570" y="122" text-anchor="middle" dominant-baseline="central">:11434</text>

  <!-- stdio arrow (dashed - not the SSE path) -->
  <line x1="204" y1="108" x2="258" y2="108" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
  <text class="ts label-gray" x="231" y="101" text-anchor="middle">stdio</text>

  <!-- Docker boundary -->
  <line x1="40" y1="240" x2="640" y2="240" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text class="ts label-gray" x="340" y="256" text-anchor="middle">Docker network boundary</text>

  <!-- k3d cluster container -->
  <rect x="20" y="264" width="300" height="210" rx="14" class="box-blue" stroke-width="0.5"/>
  <text class="th" x="40" y="292">k3d cluster</text>
  <text class="ts" x="40" y="308">k3d-demo</text>

  <!-- bifrost-0 (k3d) -->
  <rect x="44" y="322" width="120" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
  <text class="th" x="104" y="346" text-anchor="middle" dominant-baseline="central">bifrost-0</text>
  <text class="ts" x="104" y="364" text-anchor="middle" dominant-baseline="central">:8080</text>

  <!-- mcp-kubernetes-sse svc (k3d) -->
  <rect x="44" y="402" width="256" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
  <text class="th" x="172" y="424" text-anchor="middle" dominant-baseline="central">mcp-kubernetes-sse</text>
  <text class="ts" x="172" y="442" text-anchor="middle" dominant-baseline="central">ClusterIP + Endpoints 192.168.1.21</text>

  <!-- k3d: bifrost → svc -->
  <line x1="130" y1="378" x2="150" y2="400" stroke="#185fa5" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- k3d: svc → Mac MCP -->
  <path d="M172 402 L172 258 L360 258 L360 136" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts label-teal" x="268" y="252" text-anchor="middle">192.168.1.21:8811</text>

  <!-- kind cluster container -->
  <rect x="360" y="264" width="300" height="316" rx="14" class="box-coral" stroke-width="0.5"/>
  <text class="th" x="380" y="292">kind cluster</text>
  <text class="ts" x="380" y="308">kind-devops-lab</text>

  <!-- bifrost-0 (kind) -->
  <rect x="384" y="322" width="120" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
  <text class="th" x="444" y="346" text-anchor="middle" dominant-baseline="central">bifrost-0</text>
  <text class="ts" x="444" y="364" text-anchor="middle" dominant-baseline="central">:8080</text>

  <!-- mcp-kubernetes-sse svc (kind) -->
  <rect x="384" y="402" width="256" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
  <text class="th" x="512" y="424" text-anchor="middle" dominant-baseline="central">mcp-kubernetes-sse</text>
  <text class="ts" x="512" y="442" text-anchor="middle" dominant-baseline="central">ClusterIP → socat proxy pod</text>

  <!-- socat proxy -->
  <rect x="384" y="482" width="256" height="56" rx="8" class="box-amber" stroke-width="0.5"/>
  <text class="th" x="512" y="504" text-anchor="middle" dominant-baseline="central">mcp-kubernetes-proxy</text>
  <text class="ts" x="512" y="522" text-anchor="middle" dominant-baseline="central">socat → 192.168.65.254:8811</text>

  <!-- kind: bifrost → svc -->
  <line x1="470" y1="378" x2="490" y2="400" stroke="#185fa5" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- kind: svc → proxy -->
  <line x1="512" y1="458" x2="512" y2="480" stroke="#185fa5" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- kind: proxy → Mac MCP (round the right side) -->
  <path d="M640 510 L656 510 L656 108 L462 108" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts label-amber" x="652" y="324" text-anchor="end">192.168.65.254</text>
  <text class="ts label-amber" x="652" y="338" text-anchor="end">(host.docker.internal)</text>

  <!-- Client / curl box -->
  <rect x="20" y="500" width="300" height="76" rx="14" class="box-gray" stroke-width="0.5"/>
  <text class="th" x="170" y="524" text-anchor="middle" dominant-baseline="central">curl / LLM client</text>
  <text class="ts" x="170" y="544" text-anchor="middle" dominant-baseline="central">POST localhost:8080/mcp</text>
  <text class="ts" x="170" y="560" text-anchor="middle" dominant-baseline="central">X-Api-Key: $BIFROST_VIRTUAL_KEY</text>

  <!-- port-forward arrow -->
  <path d="M170 500 L170 468 L104 468 L104 378" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts label-gray" x="56" y="474" text-anchor="start">port-forward :8080</text>

  <!-- Legend -->
  <text class="th" x="40" y="612">Tool name format</text>
  <rect x="40" y="622" width="600" height="40" rx="8" class="box-gray" stroke-width="0.5"/>
  <text x="340" y="646" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13px" dominant-baseline="central">kubernetes_local-pods_list_in_namespace</text>

  <text class="th" x="40" y="690">Network path</text>
  <line x1="40" y1="708" x2="90" y2="708" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text class="ts label-teal" x="100" y="712">k3d → Mac LAN IP (192.168.1.21)</text>
  <line x1="350" y1="708" x2="400" y2="708" stroke="#BA7517" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)" fill="none"/>
  <text class="ts label-amber" x="410" y="712">kind → socat → host.docker.internal</text>
</svg>
