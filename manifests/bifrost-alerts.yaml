apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bifrost
  namespace: ai-gateway
  labels:
    app: bifrost
    prometheus: kube-prometheus
spec:
  groups:
  - name: bifrost.rules
    interval: 30s
    rules:
    - alert: BifrostHighErrorRate
      expr: |
        (sum(rate(bifrost_gateway_requests_total{status=~"5.."}[5m])) by (instance) / 
         sum(rate(bifrost_gateway_requests_total[5m])) by (instance)) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Bifrost high error rate ({{ $value | humanizePercentage }})"
        description: "Bifrost {{ $labels.instance }} has error rate > 5% for 5m"

    - alert: BifrostHighLatency
      expr: |
        histogram_quantile(0.95, sum(rate(bifrost_gateway_request_duration_seconds_bucket[5m])) by (le, instance)) > 1.0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Bifrost high p95 latency ({{ $value }}s)"
        description: "Bifrost {{ $labels.instance }} p95 latency > 1s for 5m"

    - alert: BifrostPodCrashing
      expr: |
        rate(bifrost_container_last_seen{pod=~"bifrost-.*"}[5m]) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Bifrost pod {{ $labels.pod }} is crashing"
        description: "Bifrost pod {{ $labels.pod }} has restarted recently"

    - alert: BifrostMCPClientDisconnected
      expr: |
        bifrost_mcp_client_connected < 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Bifrost MCP client disconnected"
        description: "Bifrost has no active MCP client connections for 5m"

    - alert: BifrostMemoryUsageHigh
      expr: |
        container_memory_usage_bytes{pod=~"bifrost-.*"} / container_spec_memory_limit_bytes{pod=~"bifrost-.*"} > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Bifrost memory usage high ({{ $value | humanizePercentage }})"
        description: "Bifrost {{ $labels.pod }} memory usage > 85% for 5m"
