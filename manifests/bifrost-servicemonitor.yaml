apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bifrost
  namespace: ai-gateway
  labels:
    app: bifrost
    release: kube-prometheus-stack  # Changed from: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bifrost  # Changed from: app: bifrost
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scheme: http
