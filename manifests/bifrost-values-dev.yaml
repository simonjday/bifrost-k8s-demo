# bifrost-values-dev.yaml
# Minimal kind/k3d dev install — SQLite, single replica, ephemeral storage
# Usage: helm install bifrost bifrost/bifrost -n ai-gateway -f bifrost-values-dev.yaml

image:
  tag: v1.5.0

bifrost:
  encryptionKeySecret:
    name: bifrost-encryption-key
    key: encryption-key

# Required if cluster enforces pod label policies (e.g. Kyverno require-pod-labels)
podLabels:
  app: bifrost
  env: dev

# ── kube-prometheus-stack sub-chart overrides ─────────────────────────────────
# Disable control plane component scraping — these components bind to 127.0.0.1
# in kind/k3d clusters and are unreachable from Prometheus pods. Disabling them
# removes the permanently-failing targets from the Prometheus targets page.
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false
