# bifrost-values-prod.yaml
# Production HA install — 3 replicas, PostgreSQL, autoscaling
# Usage: helm install bifrost bifrost/bifrost -n ai-gateway -f bifrost-values-prod.yaml

image:
  tag: v1.5.0-prerelease7

replicaCount: 3

storage:
  mode: postgres

postgresql:
  enabled: true
  auth:
    username: bifrost
    database: bifrost
    existingSecret: postgres-credentials
    secretKeys:
      adminPasswordKey: password
  primary:
    persistence:
      size: 50Gi

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

bifrost:
  encryptionKeySecret:
    name: bifrost-encryption-key
    key: encryption-key
  client:
    initialPoolSize: 500
    dropExcessRequests: true
    enableLogging: true

podLabels:
  app: bifrost
  env: prod

# ── kube-prometheus-stack sub-chart overrides ─────────────────────────────────
# In production (real cluster), control plane components are reachable so
# these are enabled. Comment out or set to false if deploying to kind/k3d.
kubeControllerManager:
  enabled: true

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true

kubeEtcd:
  enabled: true
