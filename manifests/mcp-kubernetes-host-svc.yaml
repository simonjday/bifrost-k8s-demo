# mcp-kubernetes-host-svc.yaml
# Exposes the kubernetes-mcp-server SSE process running on the Mac host
# as an in-cluster Service so Bifrost pods can reach it via ClusterIP DNS.
#
# IMPORTANT: Use the Docker Desktop host gateway IP (192.168.65.254), NOT
# the Mac's LAN IP (192.168.1.x). k3d pods run inside Docker and route
# host traffic via the Docker bridge — host.docker.internal resolves to
# 192.168.65.254, which is reachable from all k3d pods.
#
# To verify the correct IP on your machine:
#   docker run --rm alpine nslookup host.docker.internal
#
# Usage: kubectl apply -f manifests/mcp-kubernetes-host-svc.yaml

apiVersion: v1
kind: Service
metadata:
  name: mcp-kubernetes-sse
  namespace: ai-gateway
  labels:
    app: mcp-kubernetes-sse
spec:
  type: ClusterIP
  ports:
  - name: sse
    port: 8811
    targetPort: 8811
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mcp-kubernetes-sse
  namespace: ai-gateway
  labels:
    app: mcp-kubernetes-sse
subsets:
- addresses:
  - ip: 192.168.65.254    # Docker Desktop host gateway (host.docker.internal)
                           # NOT the Mac LAN IP — pods can't route to 192.168.1.x
  ports:
  - port: 8811
    protocol: TCP
