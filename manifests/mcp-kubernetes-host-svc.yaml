# mcp-kubernetes-host-svc.yaml
# Exposes the kubernetes-mcp-server SSE process running on the Mac host
# as an in-cluster Service so Bifrost pods can reach it via ClusterIP DNS.
#
# Uses a headless ClusterIP + manual Endpoints to route traffic to the
# Mac's LAN IP — reachable from k3d pods via the Docker bridge network.
#
# NOTE: The Mac IP is injected at apply-time by start-mcp-server.sh.
#       Do not edit the IP here directly — update HOST_IP in that script,
#       or let the script auto-detect it via `ipconfig getifaddr en0`.

apiVersion: v1
kind: Service
metadata:
  name: mcp-kubernetes-sse
  namespace: ai-gateway
  labels:
    app: mcp-kubernetes-sse
spec:
  type: ClusterIP
  ports:
  - name: sse
    port: 8811
    targetPort: 8811
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mcp-kubernetes-sse
  namespace: ai-gateway
  labels:
    app: mcp-kubernetes-sse
subsets:
- addresses:
  - ip: __HOST_IP__        # replaced by start-mcp-server.sh at apply-time
  ports:
  - port: 8811
    protocol: TCP
