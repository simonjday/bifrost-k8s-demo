apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-mcp
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-mcp
  template:
    metadata:
      labels:
        app: prometheus-mcp
    spec:
      initContainers:
      - name: copy-binary
        image: ghcr.io/tjhop/prometheus-mcp-server:latest
        command: ["cp", "/bin/prometheus-mcp-server", "/shared/prometheus-mcp-server"]
        volumeMounts:
        - name: shared
          mountPath: /shared
      containers:
      - name: supergateway
        image: ghcr.io/supercorp-ai/supergateway:latest
        command: ["node"]
        args:
          - --
          - /usr/local/lib/node_modules/supergateway/dist/index.js
          - --stdio
          - /shared/prometheus-mcp-server --prometheus.url=http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090 --web.listen-address=:0
          - --outputTransport
          - streamableHttp
          - --port
          - "8080"
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: shared
          mountPath: /shared
      volumes:
      - name: shared
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-mcp
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: prometheus-mcp
